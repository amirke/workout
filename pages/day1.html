<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כוח A — חזה + כתפיים</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2C2C2A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/mobile.css">
  <script src="../data/exercises-data.js"></script>
  <script src="../data/plan-data.js"></script>
  <script src="../js/tracker.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/render.js"></script>
  <script src="../js/utils.js"></script>
  <style>
    .hdr-top { display:flex;align-items:center;justify-content:space-between;padding-bottom:8px; }
    .hdr-top h1 { margin:0;font-size:.95rem;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .mode-pill { display:flex;border-radius:20px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.3);flex-shrink:0; }
    .mode-pill button { padding:4px 9px;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.72rem;font-weight:700;color:#fff;background:transparent;transition:background .15s;white-space:nowrap; }
    .mode-pill button.active-mode { background:rgba(255,255,255,0.25); }
  </style>
</head>
<body>
<header class="site-header">
  <div class="hdr-top">
    <h1 id="pageTitle">כוח A — חזה + כתפיים</h1>
    <div class="mode-pill">
      <button data-mode="gym"        onclick="setWorkoutMode('gym')">🏋️</button>
      <button data-mode="home"       onclick="setWorkoutMode('home')">🏠</button>
      <button data-mode="suspension" onclick="setWorkoutMode('suspension')">🪢</button>
      <button data-mode="band"       onclick="setWorkoutMode('band')">🔴</button>
    </div>
  </div>
  <nav class="tab-nav" id="exNav"></nav>
</header>
<main id="content">
  <div class="card"><div class="text-muted text-sm">טוען...</div></div>
</main>
<script>
  window.__rerender = function() { Render.renderStrengthPage('sunday'); };
  Render.renderStrengthPage('sunday');
</script>
<script>
  function setWorkoutMode(mode) {
    Data.setMode(mode);
    document.querySelectorAll('.mode-pill button').forEach(function(b) {
      b.classList.toggle('active-mode', b.dataset.mode === mode);
    });
    if (typeof window.__rerender === 'function') window.__rerender();
  }
  setWorkoutMode(Data.getMode());
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
  // טיימר
  Utils.renderTimerBar();
</script>
</body>
</html>
