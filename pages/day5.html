<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כוח C — רגליים + ליבה</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2C2C2A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/mobile.css">
  <script src="../data/exercises-data.js"></script>
  <script src="../data/plan-data.js"></script>
  <script src="../js/tracker.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/render.js"></script>
  <style>
    .hdr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
    }
    .hdr-top h1 { margin: 0; font-size: 1rem; font-weight: 700; }
    .mode-pill {
      display: flex;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.35);
      flex-shrink: 0;
    }
    .mode-pill button {
      padding: 4px 11px;
      border: none;
      cursor: pointer;
      font-family: 'Heebo', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      color: #fff;
      background: transparent;
      transition: background .15s;
    }
    .mode-pill button.active-mode { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
<header class="site-header">
  <div class="hdr-top">
    <h1 id="pageTitle">🏋️ כוח C</h1>
    <div class="mode-pill">
      <button data-mode="gym"  onclick="setWorkoutMode('gym')">🏋️ חדר</button>
      <button data-mode="home" onclick="setWorkoutMode('home')">🏠 בית</button>
    </div>
  </div>
  <nav class="tab-nav" id="exNav"></nav>
</header>
<main id="content">
  <div class="card"><div class="text-muted text-sm">טוען...</div></div>
</main>
<script>
  window.__rerender = function() { Render.renderStrengthPage('thursday'); };
  Render.renderStrengthPage('thursday');
</script>
<script>
  function setWorkoutMode(mode) {
    Data.setMode(mode);
    document.querySelectorAll('.mode-pill button').forEach(function(b) {
      b.classList.toggle('active-mode', b.dataset.mode === mode);
    });
    if (typeof window.__rerender === 'function') window.__rerender();
  }
  // Init on load
  setWorkoutMode(Data.getMode());
  // Service Worker
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
</script>
</body>
</html>
