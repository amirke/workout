<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תכנית כושר שבועית</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2C2C2A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="כושר">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
  <script src="data/exercises-data.js"></script>
  <script src="data/plan-data.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/render.js"></script>
  <style>
    /* מתג בהדר */
    .header-mode-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.3);
      margin-right: auto;   /* דוחף לצד שמאל ב-RTL */
      flex-shrink: 0;
    }
    .header-mode-toggle button {
      padding: 5px 13px;
      border: none;
      cursor: pointer;
      font-family: 'Heebo', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }
    .hdr-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>

<header class="site-header">
  <!-- שורה ראשונה: כותרת + מתג -->
  <div class="hdr-row">
    <div class="header-mode-toggle" id="modeToggle">
      <button data-mode="gym"        onclick="setWorkoutMode('gym')">🏋️ חדר</button>
      <button data-mode="home"       onclick="setWorkoutMode('home')">🏠 בית</button>
      <button data-mode="suspension" onclick="setWorkoutMode('suspension')">🪢 רצועות</button>
      <button data-mode="band"       onclick="setWorkoutMode('band')">🔴 גומיות</button>
    </div>
  </div>
  <!-- שורה שנייה: טאבים -->
  <nav class="tab-nav" id="mainNav">
    <button class="tab-btn active" data-panel="week">לוח שבועי</button>
    <button class="tab-btn"        data-panel="today">אימון היום</button>
    <button class="tab-btn"        data-panel="muscles">שרירים</button>
  </nav>
</header>

<main>
  <section id="panel-week">
    <p class="text-muted text-sm mb-4" id="todayBanner"></p>
    <div id="dayList"></div>
  </section>

  <section id="panel-today" hidden style="display:none">
    <div id="todayContent"></div>

    <!-- קיצורי דרך נוספים -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <a href="pages/morning.html" style="text-decoration:none">
        <div class="card" style="text-align:center;padding:16px 10px;margin:0">
          <div style="font-size:1.8rem;margin-bottom:6px">🌅</div>
          <div style="font-size:.85rem;font-weight:700;color:#1A1A1A">שגרת בוקר</div>
          <div style="font-size:.72rem;color:#6B6B6B;margin-top:3px">15–20 דקות</div>
        </div>
      </a>
      <a href="pages/stretch.html" style="text-decoration:none">
        <div class="card" style="text-align:center;padding:16px 10px;margin:0">
          <div style="font-size:1.8rem;margin-bottom:6px">🛏️</div>
          <div style="font-size:.85rem;font-weight:700;color:#1A1A1A">מתיחות בוקר</div>
          <div style="font-size:.72rem;color:#6B6B6B;margin-top:3px">5–10 דקות</div>
        </div>
      </a>
    </div>
  </section>

  <section id="panel-muscles" hidden style="display:none">
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#EEEDFE">🗺️</div>
        <div>
          <div class="card-title">מפת שרירים</div>
          <div class="card-subtitle">לחץ על שריר לפרטים</div>
        </div>
      </div>
      <a href="pages/muscles.html" class="btn-save"
         style="text-decoration:none;display:block;text-align:center">
        פתח מפה אינטראקטיבית
      </a>
    </div>
  </section>
</main>

<script>
  // ── Tab switching ──────────────────────────────
  document.querySelectorAll('[data-panel]').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('[data-panel]').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      document.querySelectorAll('section[id^="panel-"]').forEach(function(p) {
        var show = p.id === 'panel-' + tab.dataset.panel;
        p.hidden = !show;
        p.style.display = show ? '' : 'none';
      });
    });
  });

  // ── מתג 4 מצבים ────────────────────────────────
  function setWorkoutMode(mode) {
    Data.setMode(mode);
    document.querySelectorAll('#modeToggle button').forEach(function(b) {
      b.style.background = b.dataset.mode === mode ? 'rgba(255,255,255,0.25)' : 'transparent';
      b.style.color = '#fff';
    });
  }

  // הפעל ברירת מחדל
  setWorkoutMode(Data.getMode());

  // ── Service Worker ─────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(function() { console.log('SW registered'); })
      .catch(function(e) { console.log('SW error:', e); });
  }

  // ── Render ─────────────────────────────────────
  Render.renderDashboard();
</script>
</body>
</html>
