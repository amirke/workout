<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תכנית כושר שבועית</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2C2C2A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="כושר">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
  <script src="data/exercises-data.js"></script>
  <script src="data/plan-data.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/render.js"></script>
</head>
<body>

<header class="site-header">
  <h1>💪 תכנית כושר</h1>
  <nav class="tab-nav" id="mainNav">
    <button class="tab-btn active" data-panel="week">לוח שבועי</button>
    <button class="tab-btn"        data-panel="today">אימון היום</button>
    <button class="tab-btn"        data-panel="muscles">שרירים</button>
  </nav>
</header>

<main>
  <section id="panel-week">
    <p class="text-muted text-sm mb-4" id="todayBanner"></p>

    <!-- מתג gym / home -->
    <div id="modeBar" style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span class="text-muted text-sm">סוג אימון:</span>
      <div style="display:flex;border-radius:12px;overflow:hidden;border:1.5px solid #EEEDFE">
        <button id="globalGym"  onclick="setWorkoutMode('gym')"
                style="padding:7px 16px;border:none;cursor:pointer;font-family:Heebo,sans-serif;font-size:.82rem;font-weight:700">
          🏋️ חדר כושר
        </button>
        <button id="globalHome" onclick="setWorkoutMode('home')"
                style="padding:7px 16px;border:none;cursor:pointer;font-family:Heebo,sans-serif;font-size:.82rem;font-weight:700">
          🏠 בית
        </button>
      </div>
    </div>

    <div id="dayList"></div>
  </section>

  <section id="panel-today" hidden style="display:none">
    <div id="todayContent"></div>
  </section>

  <section id="panel-muscles" hidden style="display:none">
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#EEEDFE">🗺️</div>
        <div>
          <div class="card-title">מפת שרירים</div>
          <div class="card-subtitle">לחץ על שריר לפרטים</div>
        </div>
      </div>
      <a href="pages/muscles.html" class="btn-save"
         style="text-decoration:none;display:block;text-align:center">
        פתח מפה אינטראקטיבית
      </a>
    </div>
  </section>
</main>

<script>
  // ── Tab switching ──────────────────────────────
  document.querySelectorAll('[data-panel]').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('[data-panel]').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      document.querySelectorAll('section[id^="panel-"]').forEach(function(p) {
        var show = p.id === 'panel-' + tab.dataset.panel;
        p.hidden = !show;
        p.style.display = show ? '' : 'none';
      });
    });
  });

  // ── מתג gym / home ─────────────────────────────
  function setWorkoutMode(mode) {
    Data.setMode(mode);
    var isGym = mode === 'gym';
    document.getElementById('globalGym').style.background  = isGym  ? '#3C3489' : '#fff';
    document.getElementById('globalGym').style.color       = isGym  ? '#fff'    : '#3C3489';
    document.getElementById('globalHome').style.background = !isGym ? '#3C3489' : '#fff';
    document.getElementById('globalHome').style.color      = !isGym ? '#fff'    : '#3C3489';
  }

  // הפעל ברירת מחדל
  setWorkoutMode(Data.getMode());

  // ── Render ─────────────────────────────────────
  Render.renderDashboard();
</script>
</body>
</html>
